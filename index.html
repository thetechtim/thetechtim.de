<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>thetechtim.de</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="./github_thetechtim.png">
</head>

<body>

  <div class="toggle">
    Toggle Mode
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-inner">
      <h1>
        &lt; thetechtim.de /&gt;
      </h1>
    </div>
  </section>

    <h2>
      Willkommen auf thetechtim.de !
    </h2>

    
    <a href="https://github.com/thetechtim" target="_blank" rel="noopener noreferrer" class="link">
      GitHub
    </a>

    <footer>
      <hr>
      Author: thetechtim <br>
      &copy; copyright reserved
      <strong>
        <a href="mailto:info@thetechtim.de">
          info@thetechtim.de
        </a>
      </strong>

    </footer>

</body>

  <script>

    const heroInner =
      document.querySelector('.hero-inner');

    const toggle =
      document.querySelector('.toggle');

    let scrollY = 0;
    let targetY = 0;

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function render() {

      scrollY +=
        (targetY - scrollY) * 0.12;

      const maxScroll = 300;

      let progress =
        Math.min(scrollY / maxScroll, 1);

      progress =
        easeOutCubic(progress);

      const isMobile =
        window.innerWidth < 600;

      const scaleFactor =
        isMobile ? 0.25 : 0.4;

      const scale =
        1 - (scaleFactor * progress);

      const translateY =
        -50 - (100 * progress);

      heroInner.style.transform =
        `translate(-50%, ${translateY}%)
         scale(${scale})`;

      toggle.classList.toggle(
        'visible',
        scrollY > 100
      );

      requestAnimationFrame(render);
    }

    window.addEventListener(
      'scroll',
      () => {
        targetY = window.scrollY;
      },
      { passive: true }
    );

    requestAnimationFrame(render);

    toggle.addEventListener('click', () => {
      document.body.classList.toggle('light');
    });

  </script>

</html>
